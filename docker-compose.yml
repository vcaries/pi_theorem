# =============================================================================
# Pi-Scope full stack: FastAPI backend + nginx-served React frontend.
# Run everything with a single command:  docker compose up --build
# =============================================================================
services:
  backend:
    build:
      context: ./backend
    container_name: pi-scope-backend
    environment:
      PISCOPE_LOG_LEVEL: INFO
      # Allow the frontend container (served from nginx on :80) to call the API.
      PISCOPE_CORS_ORIGINS: '["http://localhost","http://localhost:80","http://localhost:5173"]'
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
    container_name: pi-scope-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="Segoe UI, Inter, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="600" fill="url(#bg)"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="1000" height="64" fill="#0b1120" opacity="0.7"/>
  <rect x="28" y="18" width="28" height="28" rx="8" fill="#4f46e5"/>
  <text x="42" y="38" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">&#928;</text>
  <text x="70" y="34" font-size="18" font-weight="700" fill="#f8fafc">Pi-Scope</text>
  <text x="70" y="50" font-size="11" fill="#94a3b8">Vaschy–Buckingham Π theorem</text>
  <rect x="838" y="20" width="60" height="26" rx="8" fill="#1e293b"/>
  <text x="868" y="37" font-size="11" fill="#cbd5e1" text-anchor="middle">FR · EN</text>
  <circle cx="924" cy="33" r="13" fill="#1e293b"/>
  <circle cx="924" cy="33" r="6" fill="#fbbf24"/>

  <!-- Left card: variables -->
  <rect x="28" y="92" width="560" height="220" rx="16" fill="#0b1120" stroke="#1e293b"/>
  <text x="52" y="124" font-size="15" font-weight="700" fill="#e2e8f0">Variables</text>
  <text x="52" y="142" font-size="11" fill="#64748b">Add custom variables or pick from the library</text>
  <!-- table rows -->
  <g font-size="13" fill="#cbd5e1">
    <rect x="52" y="156" width="512" height="1" fill="#1e293b"/>
    <text x="60" y="178">τ</text><text x="160" y="178" fill="#64748b">Tip gap</text><text x="540" y="178" fill="#22d3ee" text-anchor="end">L</text>
    <rect x="52" y="190" width="512" height="1" fill="#1e293b"/>
    <text x="60" y="212">ρ</text><text x="160" y="212" fill="#64748b">Density</text><text x="540" y="212" fill="#22d3ee" text-anchor="end">M L⁻³</text>
    <rect x="52" y="224" width="512" height="1" fill="#1e293b"/>
    <text x="60" y="246">Δp</text><text x="160" y="246" fill="#64748b">Pressure diff.</text><text x="540" y="246" fill="#22d3ee" text-anchor="end">M L⁻¹ T⁻²</text>
    <rect x="52" y="258" width="512" height="1" fill="#1e293b"/>
    <text x="60" y="280">Γ</text><text x="160" y="280" fill="#64748b">Circulation</text><text x="540" y="280" fill="#22d3ee" text-anchor="end">L² T⁻¹</text>
  </g>
  <rect x="52" y="296" width="150" height="0" fill="none"/>

  <!-- Library chips -->
  <rect x="28" y="328" width="560" height="244" rx="16" fill="#0b1120" stroke="#1e293b"/>
  <text x="52" y="360" font-size="15" font-weight="700" fill="#e2e8f0">Variable library</text>
  <g font-size="11" fill="#fff">
    <rect x="52" y="376" width="86" height="26" rx="13" fill="#4f46e5"/><text x="95" y="393" text-anchor="middle">Mechanics</text>
    <rect x="146" y="376" width="74" height="26" rx="13" fill="#1e293b"/><text x="183" y="393" text-anchor="middle" fill="#cbd5e1">Fluids</text>
    <rect x="228" y="376" width="96" height="26" rx="13" fill="#1e293b"/><text x="276" y="393" text-anchor="middle" fill="#cbd5e1">Thermo</text>
    <rect x="332" y="376" width="78" height="26" rx="13" fill="#1e293b"/><text x="371" y="393" text-anchor="middle" fill="#cbd5e1">EM</text>
    <rect x="418" y="376" width="96" height="26" rx="13" fill="#1e293b"/><text x="466" y="393" text-anchor="middle" fill="#cbd5e1">Acoustics</text>
  </g>
  <g font-size="13">
    <rect x="52" y="418" width="246" height="40" rx="10" fill="#111a2e" stroke="#1e293b"/>
    <text x="68" y="443" fill="#a5b4fc">v</text><text x="92" y="443" fill="#64748b" font-size="11">Velocity</text><text x="282" y="443" fill="#475569" text-anchor="end">+</text>
    <rect x="312" y="418" width="246" height="40" rx="10" fill="#111a2e" stroke="#1e293b"/>
    <text x="328" y="443" fill="#a5b4fc">μ</text><text x="352" y="443" fill="#64748b" font-size="11">Viscosity</text><text x="542" y="443" fill="#475569" text-anchor="end">+</text>
    <rect x="52" y="468" width="246" height="40" rx="10" fill="#111a2e" stroke="#1e293b"/>
    <text x="68" y="493" fill="#a5b4fc">g</text><text x="92" y="493" fill="#64748b" font-size="11">Gravity</text><text x="282" y="493" fill="#475569" text-anchor="end">+</text>
    <rect x="312" y="468" width="246" height="40" rx="10" fill="#111a2e" stroke="#1e293b"/>
    <text x="328" y="493" fill="#a5b4fc">c</text><text x="352" y="493" fill="#64748b" font-size="11">Sound speed</text><text x="542" y="493" fill="#475569" text-anchor="end">+</text>
  </g>
  <rect x="52" y="524" width="180" height="34" rx="10" fill="url(#brand)"/>
  <text x="142" y="546" font-size="13" font-weight="700" fill="#0b1120" text-anchor="middle">Compute Π groups</text>

  <!-- Results card -->
  <rect x="612" y="92" width="360" height="480" rx="16" fill="#0b1120" stroke="#1e293b"/>
  <text x="636" y="124" font-size="15" font-weight="700" fill="#e2e8f0">Results</text>
  <g font-size="11" font-weight="700">
    <rect x="636" y="138" width="92" height="24" rx="12" fill="#312e81"/><text x="682" y="154" fill="#c7d2fe" text-anchor="middle">11 variables</text>
    <rect x="734" y="138" width="64" height="24" rx="12" fill="#0e3a44"/><text x="766" y="154" fill="#67e8f9" text-anchor="middle">rank 3</text>
    <rect x="804" y="138" width="52" height="24" rx="12" fill="#064e3b"/><text x="830" y="154" fill="#6ee7b7" text-anchor="middle">8 Π</text>
  </g>
  <!-- matrix -->
  <text x="636" y="188" font-size="12" font-weight="700" fill="#94a3b8">Dimensional matrix</text>
  <g font-family="JetBrains Mono, monospace" font-size="12" fill="#cbd5e1" text-anchor="middle">
    <text x="700" y="214" fill="#22d3ee">τ</text><text x="740" y="214" fill="#22d3ee">ρ</text><text x="780" y="214" fill="#22d3ee">Δp</text><text x="824" y="214" fill="#22d3ee">Γ</text>
    <text x="660" y="236" fill="#67e8f9">M</text><text x="700" y="236" fill="#475569">0</text><text x="740" y="236">1</text><text x="780" y="236">1</text><text x="824" y="236" fill="#475569">0</text>
    <text x="660" y="258" fill="#67e8f9">L</text><text x="700" y="258">1</text><text x="740" y="258">-3</text><text x="780" y="258">-1</text><text x="824" y="258">2</text>
    <text x="660" y="280" fill="#67e8f9">T</text><text x="700" y="280" fill="#475569">0</text><text x="740" y="280" fill="#475569">0</text><text x="780" y="280">-2</text><text x="824" y="280">-1</text>
  </g>
  <!-- pi cards -->
  <g>
    <rect x="636" y="308" width="312" height="48" rx="10" fill="#111a2e" stroke="#1e293b"/>
    <text x="656" y="338" font-size="17" fill="#f8fafc" font-family="Georgia, serif">Π₁ = τ²ρ / (δt² Δp)</text>
    <rect x="636" y="364" width="312" height="48" rx="10" fill="#111a2e" stroke="#1e293b"/>
    <text x="656" y="394" font-size="17" fill="#f8fafc" font-family="Georgia, serif">Π₂ = τ² / (δt Γ)</text>
    <rect x="636" y="420" width="312" height="48" rx="10" fill="#111a2e" stroke="#1e293b"/>
    <text x="656" y="450" font-size="17" fill="#f8fafc" font-family="Georgia, serif">Π₃ = τ / y_v</text>
    <rect x="636" y="476" width="312" height="48" rx="10" fill="#111a2e" stroke="#1e293b"/>
    <text x="656" y="506" font-size="17" fill="#f8fafc" font-family="Georgia, serif">Π₄ = τ / (δt v)</text>
  </g>
  <text x="636" y="548" font-size="11" fill="#475569">Chen (1990) · 11 variables → 8 dimensionless groups</text>
</svg>
